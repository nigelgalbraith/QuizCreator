<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Multiple Choice Quiz</title>
  <link rel="stylesheet" type="text/css" href="style/style.css">

  <!-- Simple inline favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2306b6d4'/><text x='50' y='62' font-size='58' text-anchor='middle' fill='%23071018'>Q</text></svg>">

</head>
<body>
  <h1 id="quizHeading">Multiple Choice Quiz</h1>
  <button id="backToIndexTop" style="display: none;">Back to Module Selection</button>
  <div id="quizContainer">
  <!-- Quiz content will be injected here by JavaScript -->
  </div>

  <button id="submitQuiz">Submit Quiz</button>
  <div id="resultsContainer" style="display: none;">
  <!-- Results will appear here -->
  </div>

  <button id="backToIndex" style="display: none;">Back to Module Selection</button>

  <!-- Script dependencies -->
  <script src="src/Controller.js"></script>
  <script src="src/QuizData-JSON.js"></script>
  <script src="src/Question.js"></script>
  <script src="src/Quiz.js"></script>

  <!-- External logic script -->
  <script src="src/initQuizPage.js"></script>
  <script src="src/initResultsPage.js"></script>
</body>
</html>
